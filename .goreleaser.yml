# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
# https://www.jianshu.com/p/ac18956b0bc0


#cmd: goreleaser release --snapshot --clean
version: 2 
before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...
builds:
  - id: linux
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
    goos:
      - linux
    ldflags:
      - -s -w
    flags:
      - -trimpath
  - id: darwin
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
    goos:
      - darwin
    ldflags:
      - -s -w
    flags:
      - -trimpath
archives:

  - files:
      - src: LICENSE
      - src: README.md
      - src: conf/*
      - src: scripts/*
      - src: templates/*
      - src: public/*

upx:
  - enabled: true
    goos:
      - linux
    compress: best
    lzma: true
    brute: false

checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ .Tag }}"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
